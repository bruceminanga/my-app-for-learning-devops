apiVersion: apps/v1
kind: Deployment
metadata:
  name: real-web-app
  labels:
    app: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      securityContext:         
        fsGroup: 2000  
      
      # Add this initContainers block
      initContainers:
      - name: fix-volume-permissions
        image: busybox
        command: ["sh", "-c", "chown -R 1000:2000 /usr/share/app/data && chmod -R 775 /usr/share/app/data"]
        volumeMounts:
        - name: task-pv-storage
          mountPath: "/usr/share/app/data"

      containers:
      - name: nodejs-app
        image: paulbouwer/hello-kubernetes:1.10
        ports:
        - containerPort: 8080
        envFrom:
            - configMapRef:
                name: my-app-config
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        volumeMounts:
        - name: postgres-credentials-volume
          mountPath: "/etc/postgres-secrets"
          readOnly: true
        - name: task-pv-storage
          mountPath: "/usr/share/app/data"

      volumes:
      - name: postgres-credentials-volume
        secret:
          secretName: postgres-credentials-secret
      - name: task-pv-storage
        persistentVolumeClaim:
          claimName: task-pv-claim