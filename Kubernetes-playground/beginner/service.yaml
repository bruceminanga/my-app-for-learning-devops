apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  type: NodePort
  selector:
    app: nginx # Matches the label in our Pod Deployment!
  ports:
    - port: 80        # The port the Service listens on internally
      targetPort: 80  # The port the Pods are listening on
      nodePort: 30080 # The external port opened on the node